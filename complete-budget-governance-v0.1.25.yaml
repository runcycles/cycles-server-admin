        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Webhooks]
      operationId: updateWebhookSecurityConfig
      summary: Update webhook security configuration
      description: >-
        Replaces the server-level webhook security configuration.
        Changes take effect immediately for all subsequent webhook create/update operations.
        Existing webhook subscriptions are NOT retroactively validated.

        CAUTION: Removing blocked CIDR ranges may expose the server to SSRF attacks.
      security:
        - AdminKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookSecurityConfig'
      responses:
        '200':
          description: Config updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSecurityConfig'
        '401':
          description: Missing or invalid admin API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

