# Cycles Admin Service
server.port=7979
spring.application.name=cycles-admin-service

# Redis Configuration
redis.host=${REDIS_HOST}
redis.port=${REDIS_PORT}
redis.password=${REDIS_PASSWORD}

# Jackson JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# Logging Configuration
logging.level.root=INFO
logging.level.io.runcycles.admin=${LOG_LEVEL:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# OpenAPI/Swagger Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# Management/Actuator Endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Admin API Key (for X-Admin-API-Key header)
admin.api-key=${ADMIN_API_KEY:}

# Webhook secret encryption (AES-256-GCM, base64-encoded 32-byte key)
webhook.secret.encryption-key=${WEBHOOK_SECRET_ENCRYPTION_KEY:}

# Event/delivery retention TTL (spec: 90 days hot for events)
events.retention.event-ttl-days=${EVENT_TTL_DAYS:90}
events.retention.delivery-ttl-days=${DELIVERY_TTL_DAYS:14}
