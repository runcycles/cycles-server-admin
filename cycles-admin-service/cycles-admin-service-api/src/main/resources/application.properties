# Cycles Admin Service
server.port=7979
spring.application.name=cycles-admin-service

# Redis Configuration
redis.host=${REDIS_HOST}
redis.port=${REDIS_PORT}
redis.password=${REDIS_PASSWORD}

# Jackson JSON Configuration
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# Logging Configuration
logging.level.root=INFO
logging.level.io.runcycles.admin=${LOG_LEVEL:INFO}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# OpenAPI/Swagger Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# Management/Actuator Endpoints
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
# Kubernetes-style liveness/readiness probes: /actuator/health/liveness, /actuator/health/readiness
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
# Prometheus scrape endpoint: /actuator/prometheus
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}

# Dashboard CORS origin(s). Comma-separated list of origins allowed to call /v1/**
# from a browser. Default is the local Vite dev server. In production, set via
# DASHBOARD_CORS_ORIGIN env var (e.g. https://dash.example.com or
# https://dash.example.com,https://staging.example.com).
dashboard.cors.origin=${DASHBOARD_CORS_ORIGIN:http://localhost:5173}

# Admin API Key (for X-Admin-API-Key header)
admin.api-key=${ADMIN_API_KEY:}

# Webhook secret encryption (AES-256-GCM, base64-encoded 32-byte key)
webhook.secret.encryption-key=${WEBHOOK_SECRET_ENCRYPTION_KEY:}

# Event/delivery retention TTL (spec: 90 days hot for events)
events.retention.event-ttl-days=${EVENT_TTL_DAYS:90}
events.retention.delivery-ttl-days=${DELIVERY_TTL_DAYS:14}
