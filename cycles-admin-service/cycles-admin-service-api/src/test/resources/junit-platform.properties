# jqwik uses JUnit Platform configuration parameters since jqwik 1.6.
# Override per invocation with e.g. -Djqwik.tries.default=100.
jqwik.database = .jqwik-database
jqwik.tries.default = 20
jqwik.maxdiscardratio.default = 5
jqwik.reporting.usejunitplatform = false
jqwik.reporting.onlyfailures = false
